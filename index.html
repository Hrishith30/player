<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Music Player</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <style>
    body {
      background-color: #f8f9fa;
    }

    #player {
      max-width: 600px;
      margin: auto;
    }

    #playlist {
      max-width: 600px;
      margin: auto;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container text-center my-5">
    <h1>Music Player</h1>
    <div id="player" class="card shadow-lg p-3 mb-5 bg-white rounded">
      <audio id="audio" controls class="w-100" playsinline webkit-playsinline preload="auto"></audio>
      <div class="mt-3">
        <button id="prev" class="btn btn-primary">Previous</button>
        <button id="play" class="btn btn-success">Play</button>
        <button id="pause" class="btn btn-warning">Pause</button>
        <button id="next" class="btn btn-primary">Next</button>
      </div>
      <p id="current-song" class="mt-3">Loading songs...</p>
    </div>

    <ul id="playlist" class="list-group"></ul>
  </div>

  <script>
    // DOM Elements
    const audio = document.getElementById('audio');
    const playButton = document.getElementById('play');
    const pauseButton = document.getElementById('pause');
    const prevButton = document.getElementById('prev');
    const nextButton = document.getElementById('next');
    const currentSong = document.getElementById('current-song');
    const playlist = document.getElementById('playlist');

    // Repository Details
    const repoUrl = "https://api.github.com/repos/Hrishith30/player/contents/";
    let songs = [];
    let currentIndex = 0;

    // Fetch songs from the GitHub repository
    async function fetchSongs() {
      try {
        const response = await fetch(repoUrl);
        const files = await response.json();

        // Filter for .mp3 files and build the song list
        songs = files
          .filter(file => file.name.endsWith('.mp3'))
          .map(file => ({
            name: file.name,
            url: file.download_url,
          }));

        if (songs.length > 0) {
          populatePlaylist();
          updateSong();
        } else {
          currentSong.textContent = "No songs found in the repository.";
        }
      } catch (error) {
        console.error("Error fetching songs:", error);
        currentSong.textContent = "Failed to load songs. Please check the repository.";
      }
    }

    // Populate playlist
    function populatePlaylist() {
      playlist.innerHTML = songs
        .map(
          (song, index) =>
            `<li class="list-group-item" onclick="playSong(${index})">${song.name}</li>`
        )
        .join("");
    }

    // Update audio source and play
    function updateSong() {
      audio.src = songs[currentIndex].url;
      currentSong.textContent = `Now Playing: ${songs[currentIndex].name}`;
      audio.play();
    }

    // Play a specific song
    function playSong(index) {
      currentIndex = index;
      updateSong();
    }

    // Event Listeners
    playButton.addEventListener("click", () => audio.play());
    pauseButton.addEventListener("click", () => audio.pause());

    prevButton.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + songs.length) % songs.length;
      updateSong();
    });

    nextButton.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % songs.length;
      updateSong();
    });

    // Add auto-play next song functionality
    audio.addEventListener("ended", () => {
      currentIndex = (currentIndex + 1) % songs.length;
      updateSong();
    });

    // Fetch songs on load
    fetchSongs();
  </script>
</body>
</html>
